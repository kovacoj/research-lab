name: opencode-tag-review-trigger

on:
  push:
    tags:
      - 'v*'

jobs:
  trigger-review:
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve previous tag
        id: prev-tag
        run: |
          current_tag="${GITHUB_REF_NAME}"
          previous_tag="$(git tag --sort=-version:refname | grep -A1 "^${current_tag}$" | tail -1)"
          if [ -z "$previous_tag" ] || [ "$previous_tag" = "$current_tag" ]; then
            previous_sha="$(git rev-list --max-parents=0 HEAD)"
            echo "No previous tag found; using initial commit ${previous_sha}"
          else
            previous_sha="$(git rev-list -1 "${previous_tag}")"
            echo "Previous tag: ${previous_tag} (${previous_sha})"
          fi
          echo "previous_sha=${previous_sha}" >> "$GITHUB_OUTPUT"

      - name: Dispatch and wait for OpenCode review
        uses: actions/github-script@v7
        with:
          script: |
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow_id = "opencode-tag-review.yml";
            const beforeSha = "${{ steps.prev-tag.outputs.previous_sha }}";
            const afterSha = context.sha;
            const startedAt = Date.now();

            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id,
              ref: "main",
              inputs: {
                before_sha: beforeSha,
                after_sha: afterSha,
                tag_name: context.ref.replace("refs/tags/", ""),
              },
            });

            let runId = null;
            for (let attempt = 0; attempt < 45; attempt += 1) {
              await sleep(10000);
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id,
                event: "workflow_dispatch",
                per_page: 20,
              });
              const run = data.workflow_runs.find((item) => {
                return item.head_sha === afterSha && new Date(item.created_at).getTime() >= startedAt - 60000;
              });
              if (run) {
                runId = run.id;
                core.info(`Found review workflow run ${runId}`);
                break;
              }
            }

            if (!runId) {
              core.setFailed("Timed out waiting for dispatched review workflow to appear.");
              return;
            }

            for (let attempt = 0; attempt < 180; attempt += 1) {
              await sleep(10000);
              const { data: run } = await github.rest.actions.getWorkflowRun({
                owner,
                repo,
                run_id: runId,
              });
              core.info(`Review workflow status: ${run.status}, conclusion: ${run.conclusion}`);
              if (run.status === "completed") {
                if (run.conclusion !== "success") {
                  core.setFailed(`OpenCode review reported ${run.conclusion}.`);
                }
                return;
              }
            }

            core.setFailed("Timed out waiting for OpenCode review workflow to finish.");
