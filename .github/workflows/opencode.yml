# resource: https://opencode.ai/docs/github/

name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      github.event.comment.user.type != 'Bot' &&
      (
        startsWith(github.event.comment.body || '', '/oc') ||
        startsWith(github.event.comment.body || '', '/opencode')
      )

    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Configure Git author
        run: |
          git config --global user.name "opencode-agent[bot]"
          git config --global user.email "219766164+opencode-agent[bot]@users.noreply.github.com"

      - name: Run OpenCode
        uses: anomalyco/opencode/github@v1.14.50
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          SIEMENS_LLM_API_KEY: ${{ secrets.SIEMENS_LLM_API_KEY }}
          OPENCODE_CONFIG_CONTENT: |
            {
              "model": "siemens/glm-5",
              "small_model": "siemens/ministral-3-14b-instruct-2512",
              "enabled_providers": ["siemens"],
              "share": "disabled"
            }
        with:
          model: siemens/glm-5
          share: false
