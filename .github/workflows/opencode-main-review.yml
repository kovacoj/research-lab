name: opencode-main-review

on:
  push:
    branches:
      - main

jobs:
  review:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: read
      id-token: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run OpenCode review
        uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIEMENS_LLM_API_KEY: ${{ secrets.SIEMENS_LLM_API_KEY }}
          OPENCODE_CONFIG_CONTENT: |
            {
              "model": "siemens/glm-5",
              "small_model": "siemens/ministral-3-14b-instruct-2512",
              "enabled_providers": ["siemens"],
              "share": "disabled"
            }
        with:
          model: siemens/glm-5
          share: false
          use_github_token: true
          prompt: |
            Review the changes introduced on `main` from `${{ github.event.before }}` to `${{ github.sha }}`.

            Scope:
            - Review the pushed diff for correctness bugs, regressions, security issues, broken behavior, maintainability hazards, and missing tests that could hide a defect.
            - Ignore minor formatting or style-only nits.
            - Do not modify code, do not create commits, do not open pull requests, and do not comment on commits.

            Outcome:
            - If you find no material problem, finish without creating any issue.
            - If you find a material problem, first check whether an open issue already exists with title prefix `[auto-review]` and commit SHA `${{ github.sha }}`.
            - If no such issue exists, create exactly one GitHub issue.
            - The issue title must start with `[auto-review]`.
            - The issue body must include commit SHA `${{ github.sha }}`, affected files, the problem, why it matters, and a suggested fix.
            - Do not create more than one issue for this workflow run.

      - name: Fail when a review issue exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          query="repo:${{ github.repository }} is:issue is:open in:title,body \"[auto-review]\" \"${{ github.sha }}\""
          count="$(gh api search/issues -f q="$query" --jq '.total_count')"
          if [ "$count" -gt 0 ]; then
            echo "OpenCode found a material problem and created an issue."
            exit 1
          fi
