name: opencode-tag-review

on:
  workflow_dispatch:
    inputs:
      before_sha:
        description: "Commit before the push"
        required: true
        type: string
      after_sha:
        description: "Commit after the push"
        required: true
        type: string

jobs:
  review:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: read
      id-token: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.after_sha }}

      - name: Run OpenCode review
        uses: anomalyco/opencode/github@v1.14.41
        env:
          SIEMENS_LLM_API_KEY: ${{ secrets.SIEMENS_LLM_API_KEY }}
          OPENCODE_CONFIG_CONTENT: |
            {
              "model": "siemens/glm-5",
              "small_model": "siemens/ministral-3-14b-instruct-2512",
              "enabled_providers": ["siemens"],
              "share": "disabled"
            }
        with:
          model: siemens/glm-5
          share: false
          prompt: |
            Review the changes introduced on `main` from `${{ inputs.before_sha }}` to `${{ inputs.after_sha }}`.

            Scope:
            - Review the pushed diff for correctness bugs, regressions, security issues, broken behavior, maintainability hazards, and missing tests that could hide a defect.
            - Ignore minor formatting or style-only nits.
            - Do not modify code, do not create commits, do not open pull requests, and do not comment on commits.

            Outcome:
            - If you find no material problem, finish without creating any issue.
            - If you find a material problem, first check whether an open issue already exists with title prefix `[auto-review]` and commit SHA `${{ inputs.after_sha }}`.
            - If no such issue exists, create exactly one GitHub issue.
            - The issue title must start with `[auto-review]`.
            - The issue body must include commit SHA `${{ inputs.after_sha }}`, affected files, the problem, why it matters, and a suggested fix.
            - Do not create more than one issue for this workflow run.

      - name: Fail when a review issue exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          count="$(gh issue list --state open --search "[auto-review] ${{ inputs.after_sha }}" --json number --jq length 2>/dev/null || echo 0)"
          if [ "$count" -gt 0 ]; then
            echo "OpenCode found a material problem and created an issue."
            exit 1
          fi
