name: opencode-tag-review-trigger

on:
  push:
    tags:
      - '**'

jobs:
  trigger-review:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      actions: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Dispatch and wait for OpenCode review
        uses: actions/github-script@v9
        env:
          TAG_NAME: ${{ github.ref_name }}
        with:
          script: |
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow_id = "opencode-main-review.yml";
            const tagName = process.env.TAG_NAME;
            const afterSha = context.sha;

            const { execSync } = require("child_process");
            let beforeSha;
            try {
              const allTags = execSync(
                `git tag --sort=-version:refname`
              ).toString().trim().split("\n");
              const idx = allTags.indexOf(tagName);
              if (idx >= 0 && idx + 1 < allTags.length) {
                beforeSha = execSync(`git rev-parse ${allTags[idx + 1]}`).toString().trim();
              } else {
                const { data: tags } = await github.rest.repos.listTags({ owner, repo, per_page: 100 });
                const sorted = tags.map(t => t.name);
                const tagIdx = sorted.indexOf(tagName);
                if (tagIdx >= 0 && tagIdx + 1 < sorted.length) {
                  beforeSha = tags[tagIdx + 1].commit.sha;
                }
              }
            } catch {
              core.info("Could not determine previous tag; using empty tree as before_sha.");
            }
            if (!beforeSha) {
              beforeSha = "4b825dc642cb6eb9a060e54bf899d69f3f60a850";
            }

            const startedAt = Date.now();

            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id,
              ref: "main",
              inputs: {
                before_sha: beforeSha,
                after_sha: afterSha,
              },
            });

            let runId = null;
            for (let attempt = 0; attempt < 45; attempt += 1) {
              await sleep(10000);
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id,
                event: "workflow_dispatch",
                per_page: 20,
              });
              const run = data.workflow_runs.find((item) => {
                return item.head_sha === afterSha && new Date(item.created_at).getTime() >= startedAt - 60000;
              });
              if (run) {
                runId = run.id;
                core.info(`Found review workflow run ${runId}`);
                break;
              }
            }

            if (!runId) {
              core.setFailed("Timed out waiting for dispatched review workflow to appear.");
              return;
            }

            for (let attempt = 0; attempt < 180; attempt += 1) {
              await sleep(10000);
              const { data: run } = await github.rest.actions.getWorkflowRun({
                owner,
                repo,
                run_id: runId,
              });
              core.info(`Review workflow status: ${run.status}, conclusion: ${run.conclusion}`);
              if (run.status === "completed") {
                if (run.conclusion !== "success") {
                  core.setFailed(`OpenCode review reported ${run.conclusion}.`);
                }
                return;
              }
            }

            core.setFailed("Timed out waiting for OpenCode review workflow to finish.");
